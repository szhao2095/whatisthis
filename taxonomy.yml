# Language family taxonomy for --family-first classification.
# Maps each language name to a broad family so the classifier only compares
# candidates within the same family, reducing cross-family confusion.
# Languages not listed here are implicitly in the "General" family.
#
# Families:
#   WebScript   - HTML, JavaScript, CSS, PHP, templating, HTA variants
#   Shell       - Unix shell, batch, PowerShell, scripting runtimes
#   OfficeMacro - VBA and macro-enabled Office formats
#   DataMarkup  - JSON, XML, YAML, TOML, configuration, serialization
#   Prose       - Markdown, reStructuredText, plain text
#   Systems     - C, C++, Rust, Go, Assembly (low-level compiled)
#   JVM         - Java, Kotlin, Scala, Clojure, Groovy
#   Scripting   - Python, Ruby, Perl, Lua, R, PHP (interpreted scripting)
#   Functional  - Haskell, OCaml, F*, Erlang, Elixir
#   General     - everything else

